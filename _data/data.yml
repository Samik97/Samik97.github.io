career-profile:
  title: Career Profile
  summary: |
    I am a mathematical statistician with a background that spans pure mathematics,
    education, and applied statistics. My academic journey has equipped me with a
    strong foundation in both theoretical and computational aspects of mathematics
    and statistics.

    I am currently working as a Research Assistant at the Indian Statistical Institute,
    Kolkata, where my work involves applications of graph-theoretic structures in
    telecommunications. My long-term goal is to pursue a PhD at the intersection of
    mathematics and computer science.

